<script>
(function() {
    window.searchResultTitleTemplate = "#PAGES_COUNT 个结果（用时 #TIME_SECONDS 秒）";

    class SearchEngine {
        constructor({form, input, list, resultTitle, resultTitleTemplate}) {
            this.form = form;
            this.input = input;
            this.list = list;
            this.resultTitle = resultTitle;
            this.resultTitleTemplate = resultTitleTemplate;
            this.container = list.parentElement;
            this.data = null;

            
            this.init();
        }

        async init() {
            
            const urlParams = new URLSearchParams(window.location.search);
            const keyword = urlParams.get('keyword');

            if (keyword) {
                this.input.value = keyword;
                await this.doSearch(keyword.split(/\s+/));
            } else {
                this.handleQueryString();
            }

            this.bindEvents();
        }

        async getData() {
            if (!this.data) {
                const jsonUrl = this.form.dataset.json;
                const response = await fetch(jsonUrl);
                this.data = await response.json();

                
                const parser = new DOMParser();
                this.data = this.data.map(item => ({
                    ...item,
                    content: parser.parseFromString(item.content, 'text/html').body.innerText
                }));
            }
            return this.data;
        }

        escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        processMatches(text, matches, truncate = true, maxLength = 140, contextChars = 20) {
            if (matches.length === 0) return text.substring(0, maxLength);

            matches.sort((a, b) => a.start - b.start);

            let result = [];
            let lastEnd = 0;
            let totalLength = 0;

            for (const match of matches) {
                if (truncate && match.start - lastEnd > contextChars) {
                    result.push(this.escapeHtml(text.substring(lastEnd, lastEnd + contextChars)));
                    result.push(' ... ');
                    result.push(this.escapeHtml(text.substring(match.start - contextChars, match.start)));
                    totalLength += contextChars * 2;
                } else {
                    result.push(this.escapeHtml(text.substring(lastEnd, match.start)));
                    totalLength += match.start - lastEnd;
                }

                
                let matchEnd = match.end;
                let i = matches.indexOf(match) + 1;
                while (i < matches.length && matches[i].start <= matchEnd) {
                    matchEnd = Math.max(matchEnd, matches[i].end);
                    i++;
                }

                result.push(`<mark>${this.escapeHtml(text.substring(match.start, matchEnd))}</mark>`);
                totalLength += matchEnd - match.start;
                lastEnd = matchEnd;

                if (truncate && totalLength > maxLength) break;
            }

            if (lastEnd < text.length) {
                let end = text.length;
                if (truncate) end = Math.min(end, lastEnd + maxLength);
                result.push(this.escapeHtml(text.substring(lastEnd, end)));
                if (truncate && end !== text.length) result.push(' ...');
            }

            return result.join('');
        }

        escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async searchKeywords(keywords) {
            const data = await this.getData();
            const results = [];
            const pattern = new RegExp(
                keywords.filter(k => k.trim() !== '').map(k => this.escapeRegex(k)).join('|'),
                'gi'
            );

            for (const item of data) {
                const titleMatches = [];
                const contentMatches = [];

                
                for (const match of item.title.matchAll(pattern)) {
                    titleMatches.push({
                        start: match.index,
                        end: match.index + match[0].length
                    });
                }

                
                for (const match of item.content.matchAll(pattern)) {
                    contentMatches.push({
                        start: match.index,
                        end: match.index + match[0].length
                    });
                }

                if (titleMatches.length > 0 || contentMatches.length > 0) {
                    const resultItem = {...item};

                    if (titleMatches.length > 0) {
                        resultItem.title = this.processMatches(resultItem.title, titleMatches, false);
                    }

                    if (contentMatches.length > 0) {
                        resultItem.preview = this.processMatches(resultItem.content, contentMatches);
                    } else {
                        resultItem.preview = this.escapeHtml(resultItem.content.substring(0, 140));
                    }

                    resultItem.matchCount = titleMatches.length + contentMatches.length;
                    results.push(resultItem);
                }
            }

            return results.sort((a, b) => b.matchCount - a.matchCount);
        }

        async doSearch(keywords) {
            const startTime = performance.now();
            const results = await this.searchKeywords(keywords);

            this.clear();

            for (const result of results) {
                this.list.appendChild(this.renderResult(result));
            }

            const endTime = performance.now();
            this.resultTitle.textContent = this.generateResultTitle(
                results.length,
                ((endTime - startTime) / 1000).toFixed(2)
            );

            this.container?.classList.remove('hidden');
        }

        generateResultTitle(count, time) {
            return this.resultTitleTemplate
                .replace('#PAGES_COUNT', count.toString())
                .replace('#TIME_SECONDS', time);
        }

        clear() {
            this.list.innerHTML = '';
            this.resultTitle.textContent = '';
            this.container.classList.add('hidden');
        }

        renderResult(item) {
            const article = document.createElement('article');
            article.className = 'article-details';

            const link = document.createElement('a');
            link.href = item.permalink;

            const title = document.createElement('h2');
            title.className = 'article-title';
            title.innerHTML = item.title;

            const preview = document.createElement('div');
            preview.className = 'article-preview';
            preview.innerHTML = item.preview;

            link.appendChild(title);
            link.appendChild(preview);
            article.appendChild(link);

            return article;
        }

        bindEvents() {
            let lastKeyword = '';
            let searchTimeout;

            const handleSearch = (e) => {
                if (e && e.type === 'submit') {
                    e.preventDefault();
                }

                const keyword = this.input.value.trim();

                
                this.updateQueryString(keyword);

                if (keyword === '') {
                    lastKeyword = '';
                    this.clear();
                    return;
                }

                if (keyword !== lastKeyword) {
                    lastKeyword = keyword;
                    this.doSearch(keyword.split(/\s+/));
                }
            };

            
            this.input.addEventListener('input', () => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => handleSearch(), 300);
            });

            
            this.input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSearch();
                }
            });

            
            this.form.addEventListener('submit', handleSearch);

            
            window.addEventListener('popstate', () => {
                this.handleQueryString();
            });
        }

        handleQueryString() {
            const urlParams = new URLSearchParams(window.location.search);
            const keyword = urlParams.get('keyword') || '';
            this.input.value = keyword;

            if (keyword) {
                this.doSearch(keyword.split(/\s+/));
            } else {
                this.clear();
            }
        }

        updateQueryString(keyword) {
            const url = new URL(window.location.toString());

            if (keyword === '') {
                url.searchParams.delete('keyword');
            } else {
                url.searchParams.set('keyword', keyword);
            }

            window.history.replaceState({}, '', url.toString());
        }
    }

    
    function initSearch() {
        const form = document.querySelector('.search-form');
        const input = form?.querySelector('input');
        const list = document.querySelector('.search-result--list');
        const resultTitle = document.querySelector('.search-result--title');

        if (!form || !input || !list || !resultTitle) {
            console.error('搜索功能初始化失败：找不到必要的元素');
            return;
        }

        new SearchEngine({
            form,
            input,
            list,
            resultTitle,
            resultTitleTemplate: window.searchResultTitleTemplate
        });
    }

    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initSearch);
    } else {
        initSearch();
    }
})();
</script>

<script>
(function() {
  const hamburger = document.getElementById('hamburger-btn');
  const menu = document.getElementById('nav-menu');

  if (hamburger && menu) {
    hamburger.addEventListener('click', function() {
      hamburger.classList.toggle('active');
      menu.classList.toggle('active');
    });

    
    document.addEventListener('click', function(e) {
      if (!hamburger.contains(e.target) && !menu.contains(e.target)) {
        hamburger.classList.remove('active');
        menu.classList.remove('active');
      }
    });

    
    menu.querySelectorAll('a').forEach(function(link) {
      link.addEventListener('click', function() {
        hamburger.classList.remove('active');
        menu.classList.remove('active');
      });
    });
  }

  
  const tipToggle = document.getElementById('tip-toggle');
  const tipQrCodes = document.getElementById('tip-qr-codes');

  if (tipToggle && tipQrCodes) {
    tipToggle.addEventListener('click', function() {
      const isHidden = tipQrCodes.style.display === 'none';
      tipQrCodes.style.display = isHidden ? 'flex' : 'none';
      tipToggle.querySelector('.tip-text').textContent = isHidden ? '收起' : '赞赏';
    });
  }

  
  const tocToggle = document.getElementById('toc-toggle');
  const tocContent = document.getElementById('toc-content');

  if (tocToggle && tocContent) {
    
    if (window.innerWidth <= 1200) {
      tocToggle.classList.add('collapsed');
      tocContent.classList.add('hidden');
    }

    tocToggle.addEventListener('click', function() {
      tocToggle.classList.toggle('collapsed');
      tocContent.classList.toggle('hidden');
    });

    
    window.addEventListener('resize', function() {
      if (window.innerWidth <= 1200 && !tocToggle.classList.contains('collapsed')) {
        
        tocToggle.classList.add('collapsed');
        tocContent.classList.add('hidden');
      } else if (window.innerWidth > 1200 && tocToggle.classList.contains('collapsed')) {
        
        tocToggle.classList.remove('collapsed');
        tocContent.classList.remove('hidden');
      }
    });
  }

  
  let lastScrollTop = 0;
  const siteNav = document.querySelector('.site-nav');
  const navHeight = 60; 

  if (siteNav) {
    window.addEventListener('scroll', function() {
      const currentScrollTop = window.pageYOffset || document.documentElement.scrollTop;

      if (currentScrollTop > lastScrollTop && currentScrollTop > navHeight) {
        
        siteNav.classList.add('nav-hidden');
      } else {
        
        siteNav.classList.remove('nav-hidden');
      }

      lastScrollTop = currentScrollTop;
    }, { passive: true });
  }
})();
</script>
