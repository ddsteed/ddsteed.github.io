  renderMathInElement(document.body, {

      {left: '\\[', right: '\\]', display: true},

      {left: '\\(', right: '\\)', display: false}
    ],
    throwOnError: false
  });
});
</script>



<script>
(function() {
  const hamburger = document.getElementById('hamburger-btn');
  const menu = document.getElementById('nav-menu');

  if (hamburger && menu) {
    hamburger.addEventListener('click', function() {
      hamburger.classList.toggle('active');
      menu.classList.toggle('active');
    });

    
    document.addEventListener('click', function(e) {
      if (!hamburger.contains(e.target) && !menu.contains(e.target)) {
        hamburger.classList.remove('active');
        menu.classList.remove('active');
      }
    });

    
    menu.querySelectorAll('a').forEach(function(link) {
      link.addEventListener('click', function() {
        hamburger.classList.remove('active');
        menu.classList.remove('active');
      });
    });
  }

  
  const tipToggle = document.getElementById('tip-toggle');
  const tipQrCodes = document.getElementById('tip-qr-codes');

  if (tipToggle && tipQrCodes) {
    tipToggle.addEventListener('click', function() {
      const isHidden = tipQrCodes.style.display === 'none';
      tipQrCodes.style.display = isHidden ? 'flex' : 'none';
      tipToggle.querySelector('.tip-text').textContent = isHidden ? '收起' : '赞赏';
    });
  }

  
  const tocToggle = document.getElementById('toc-toggle');
  const tocContent = document.getElementById('toc-content');

  if (tocToggle && tocContent) {
    
    if (window.innerWidth <= 1200) {
      tocToggle.classList.add('collapsed');
      tocContent.classList.add('hidden');
    }

    tocToggle.addEventListener('click', function() {
      tocToggle.classList.toggle('collapsed');
      tocContent.classList.toggle('hidden');
    });

    
    window.addEventListener('resize', function() {
      if (window.innerWidth <= 1200 && !tocToggle.classList.contains('collapsed')) {
        
        tocToggle.classList.add('collapsed');
        tocContent.classList.add('hidden');
      } else if (window.innerWidth > 1200 && tocToggle.classList.contains('collapsed')) {
        
        tocToggle.classList.remove('collapsed');
        tocContent.classList.remove('hidden');
      }
    });
  }

  
  let lastScrollTop = 0;
  const siteNav = document.querySelector('.site-nav');
  const navHeight = 60; 

  if (siteNav) {
    window.addEventListener('scroll', function() {
      const currentScrollTop = window.pageYOffset || document.documentElement.scrollTop;

      if (currentScrollTop > lastScrollTop && currentScrollTop > navHeight) {
        
        siteNav.classList.add('nav-hidden');
      } else {
        
        siteNav.classList.remove('nav-hidden');
      }

      lastScrollTop = currentScrollTop;
    }, { passive: true });
  }
})();
</script>
